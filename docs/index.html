<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bruno Ramos</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/github.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script defer src="./js/components.js"></script>
    <script defer src="./js/i18n.js"></script>
  </head>

  <body>
    <div id="header"></div>

    <main class="container">
      <section class="about-section">
        <div class="about-container">
          <!-- FOTO -->
          <div class="about-photo">
            <img src="img/profile.jpg" alt="Bruno Ramos" />
          </div>

          <!-- TEXTO -->
          <div class="about-text">
            <h2 data-i18n="hero_title"></h2>
            <p data-i18n="hero_highlight"></p>
          </div>

          <!-- AÇÕES -->
          <div class="about-actions">
            <div class="cv-buttons">
              <a
                href="/docs/cv/brunoramoscv_ptbr.pdf"
                target="_blank"
                class="cv-button"
              >
                🇧🇷 Currículo
              </a>

              <a
                href="/docs/cv/brunoramoscv_en.pdf"
                target="_blank"
                class="cv-button"
              >
                🇺🇸 Resume
              </a>

              <a
                href="/docs/cv/brunoramoscv_es.pdf"
                target="_blank"
                class="cv-button"
              >
                🇪🇸 CV
              </a>
            </div>

            <div class="social-buttons">
              <a
                href="https://github.com/thinkbruno"
                target="_blank"
                class="social-button"
              >
                <i class="fa-brands fa-github"></i> GitHub
              </a>

              <a
                href="https://linkedin.com/in/ramosbruno90"
                target="_blank"
                class="social-button"
              >
                <i class="fa-brands fa-linkedin"></i> LinkedIn
              </a>
            </div>
          </div>
        </div>
      </section>

      <section class="about-section">
        <div class="about-card">
          <div class="about-icon">👨‍💻</div>

          <h2 data-i18n="about_title"></h2>

          <p data-i18n="about"></p>
        </div>
      </section>
      <section class="services">
        <div class="service-card">
          <div class="service-icon">💻</div>
          <h3 data-i18n="service_dev_title"></h3>
          <p data-i18n="service_dev_desc"></p>
        </div>

        <div class="service-card">
          <div class="service-icon">🐧</div>
          <h3 data-i18n="service_linux_title"></h3>
          <p data-i18n="service_linux_desc"></p>
        </div>

        <div class="service-card">
          <div class="service-icon">🖥</div>
          <h3 data-i18n="service_pc_title"></h3>
          <p data-i18n="service_pc_desc"></p>
        </div>

        <div class="service-card">
          <div class="service-icon">🌐</div>
          <h3 data-i18n="service_network_title"></h3>
          <p data-i18n="service_network_desc"></p>
        </div>
      </section>
    </main>

    <div id="footer"></div>
  </body>
</html>
