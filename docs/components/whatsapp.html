<div class="whatsapp-wrapper">
  <a class="whatsapp-link whatsapp-float" target="_blank" aria-label="WhatsApp">
    <span class="whatsapp-tooltip" data-i18n="whatsappTooltip">
      Fale comigo no WhatsApp
    </span>

    <i class="fab fa-whatsapp"></i>
  </a>

  <div id="whatsappPopup" class="whatsapp-popup">
    <button id="closePopup">×</button>

    <p data-i18n="whatsappPopupText">Precisa de ajuda? Fale comigo agora!</p>

    <a
      class="whatsapp-link popup-btn"
      target="_blank"
      data-i18n="whatsappPopupBtn"
    >
      Iniciar conversa
    </a>
  </div>
</div>
