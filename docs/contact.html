<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contato | Bruno Ramos</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/contact.css" />
    <link rel="stylesheet" href="css/footer.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script defer src="./js/components.js"></script>
    <script defer src="./js/i18n.js"></script>
  </head>
  <div id="whatsapp-container"></div>
  <body>
    <!-- HEADER -->
    <div id="header"></div>

    <main class="container contact">
      <!-- SERVIÇOS DE INFRA -->
      <section class="services-highlight">
        <h2 data-i18n="services_title"></h2>

        <p class="services-intro" data-i18n="services_intro"></p>

        <p class="services-location" data-i18n="services_location"></p>

        <div class="services-grid">
          <div class="service-card">
            <i class="fas fa-network-wired"></i>
            <h4 data-i18n="service_infra_title"></h4>
            <p data-i18n="service_infra_desc"></p>
          </div>

          <div class="service-card">
            <i class="fas fa-desktop"></i>
            <h4 data-i18n="service_support_title"></h4>
            <p data-i18n="service_support_desc"></p>
          </div>

          <div class="service-card">
            <i class="fas fa-code"></i>
            <h4 data-i18n="service_dev_title"></h4>
            <p data-i18n="service_dev_desc"></p>
          </div>

          <div class="service-card">
            <i class="fas fa-lightbulb"></i>
            <h4 data-i18n="service_consult_title"></h4>
            <p data-i18n="service_consult_desc"></p>
          </div>
        </div>

        <div class="services-cta">
          <p class="cta-text" data-i18n="services_cta_text"></p>

          <a
            class="btn service-cta"
            href="https://wa.me/5513988542002?text=Olá%20Bruno,%20vi%20seu%20site%20e%20gostaria%20de%20um%20orçamento."
            target="_blank"
          >
            <i class="fab fa-whatsapp"></i>
            <span data-i18n="services_cta"></span>
          </a>
        </div>
      </section>

      <!-- TÍTULO -->
      <h2 data-i18n="contact_title">Contato</h2>

      <!-- CARD DE CONTATOS -->
      <div class="contact-card">
        <div class="contact-grid">
          <a
            class="contact-item"
            href="https://wa.me/5513988542002"
            target="_blank"
          >
            <i class="fab fa-whatsapp"></i>
            <div>
              <strong>WhatsApp</strong>
              <p>+55 13 98854-2002</p>
            </div>
          </a>

          <a
            class="contact-item"
            href="https://instagram.com/brunoramos.tech"
            target="_blank"
          >
            <i class="fab fa-instagram"></i>
            <div>
              <strong>Instagram</strong>
              <p>@brunoramos.tech</p>
            </div>
          </a>

          <a
            class="contact-item"
            href="https://www.facebook.com/profile.php?id=61583769581436"
            target="_blank"
          >
            <i class="fab fa-facebook"></i>
            <div>
              <strong>Facebook</strong>
              <p>facebook.com/brunoramos.tech</p>
            </div>
          </a>

          <a class="contact-item" href="mailto:seuemail@email.com">
            <i class="fas fa-envelope"></i>
            <div>
              <strong>Email</strong>
              <p>Enviar mensagem</p>
            </div>
          </a>

          <a
            class="contact-item"
            href="https://linkedin.com/in/ramosbruno90"
            target="_blank"
          >
            <i class="fab fa-linkedin"></i>
            <div>
              <strong>LinkedIn</strong>
              <p>/ramosbruno90</p>
            </div>
          </a>

          <a
            class="contact-item"
            href="https://github.com/thinkbruno"
            target="_blank"
          >
            <i class="fab fa-github"></i>
            <div>
              <strong>GitHub</strong>
              <p>@thinkbruno</p>
            </div>
          </a>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>
  </body>
</html>
