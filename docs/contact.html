<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contato | Bruno Ramos</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/contact.css" />
    <link rel="stylesheet" href="css/footer.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script defer src="./js/components.js"></script>
    <script defer src="./js/i18n.js"></script>
  </head>
  <div id="whatsapp-container"></div>
  <body>
    <div id="header"></div>

    <main class="container contact">
      <section class="contact-form-section">
        <h2 data-i18n="contact_form_title"></h2>
        <p data-i18n="contact_form_intro"></p>

        <form id="whatsapp-form" class="whatsapp-form">
          <div class="form-row">
            <div class="form-group">
              <label for="name" data-i18n="contact_name"></label>
              <input type="text" id="name" name="name" required />
            </div>

            <div class="form-group">
              <label for="phone" data-i18n="contact_phone"></label>
              <input type="text" id="phone" name="phone" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email" data-i18n="contact_email"></label>
              <input type="email" id="email" name="email" />
            </div>

            <div class="form-group">
              <label for="subject" data-i18n="contact_subject"></label>
              <input type="text" id="subject" name="subject" />
            </div>
          </div>

          <div class="form-group">
            <label for="message" data-i18n="contact_message"></label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>

          <button type="submit" class="btn">
            <i class="fab fa-whatsapp"></i>
            <span data-i18n="contact_send_whatsapp"></span>
          </button>
        </form>
      </section>

      <h2 data-i18n="contact_title">Contato</h2>

      <div class="contact-links">
        <a
          href="https://wa.me/5513988542002"
          target="_blank"
          class="contact-item"
        >
          <div class="contact-title">
            <i class="fab fa-whatsapp"></i>
            <h3>WhatsApp</h3>
          </div>
          <span>+55 13 98854-2002</span>
        </a>

        <a
          href="https://instagram.com/brunoramos.tech"
          target="_blank"
          class="contact-item"
        >
          <div class="contact-title">
            <i class="fab fa-instagram"></i>
            <h3>Instagram</h3>
          </div>
          <span>@brunoramos.tech</span>
        </a>

        <a href="mailto:seuemail@dominio.com" class="contact-item">
          <div class="contact-title">
            <i class="fas fa-envelope"></i>
            <h3>Email</h3>
          </div>
          <span>Enviar mensagem</span>
        </a>

        <a
          href="https://linkedin.com/in/seuperfil"
          target="_blank"
          class="contact-item"
        >
          <div class="contact-title">
            <i class="fab fa-linkedin"></i>
            <h3>LinkedIn</h3>
          </div>
          <span>/ramosbruno90</span>
        </a>

        <a
          href="https://github.com/thinkbruno"
          target="_blank"
          class="contact-item"
        >
          <div class="contact-title">
            <i class="fab fa-github"></i>
            <h3>GitHub</h3>
          </div>
          <span>@thinkbruno</span>
        </a>
      </div>
    </main>

    <div id="footer"></div>
    <script src="./js/contact-form.js"></script>
  </body>
</html>
