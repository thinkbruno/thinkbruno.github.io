<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contato | Bruno Ramos</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/contact.css" />
    <link rel="stylesheet" href="css/footer.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script defer src="./js/components.js"></script>
    <script defer src="./js/i18n.js"></script>
  </head>

  <body>
    <!-- HEADER -->
    <div id="header"></div>

    <main class="container contact">
      <!-- TÍTULO -->
      <h2 data-i18n="contact_title">Contato</h2>

      <!-- CARD DE CONTATOS -->
      <div class="contact-card">
        <div class="contact-grid">
          <div class="contact-item">
            <i class="fas fa-envelope"></i>
            <div>
              <strong>Email</strong>
              <p>
                <a href="mailto:brunoramos90@gmail.com">
                  brunoramos90@gmail.com
                </a>
              </p>
            </div>
          </div>

          <div class="contact-item">
            <i class="fab fa-linkedin"></i>
            <div>
              <strong>LinkedIn</strong>
              <p>
                <a href="https://linkedin.com/in/ramosbruno90" target="_blank">
                  linkedin.com/in/ramosbruno90
                </a>
              </p>
            </div>
          </div>

          <div class="contact-item">
            <i class="fab fa-github"></i>
            <div>
              <strong>GitHub</strong>
              <p>
                <a href="https://github.com/thinkbruno" target="_blank">
                  github.com/thinkbruno
                </a>
              </p>
            </div>
          </div>

          <div class="contact-item">
            <i class="fab fa-whatsapp"></i>
            <div>
              <strong>WhatsApp</strong>
              <p>
                <a href="https://wa.me/5513988542002" target="_blank">
                  +55 13 98854-2002
                </a>
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- CONTATO RÁPIDO -->
      <section class="quick-contact">
        <h3 data-i18n="quick_contact_title"></h3>

        <div class="quick-contact-buttons">
          <a href="mailto:brunoramos90@gmail.com" class="quick-button email">
            <i class="fas fa-envelope"></i>
            Email
          </a>

          <a
            href="https://wa.me/5513988542002"
            target="_blank"
            class="quick-button whatsapp"
          >
            <i class="fab fa-whatsapp"></i>
            WhatsApp
          </a>

          <a
            href="https://linkedin.com/in/ramosbruno90"
            target="_blank"
            class="quick-button linkedin"
          >
            <i class="fab fa-linkedin"></i>
            LinkedIn
          </a>

          <a
            href="https://github.com/thinkbruno"
            target="_blank"
            class="quick-button github"
          >
            <i class="fab fa-github"></i>
            GitHub
          </a>
        </div>
      </section>

      <!-- SERVIÇOS DE INFRA -->
      <section class="infra-section">
        <div class="infra-card">
          <h3 data-i18n="infra_title"></h3>

          <p data-i18n="infra_text"></p>

          <p data-i18n="support_text"></p>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>
  </body>
</html>
